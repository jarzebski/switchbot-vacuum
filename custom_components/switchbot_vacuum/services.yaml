clean_rooms:
  name: "Clean Rooms"
  description: "Start cleaning specific rooms with custom settings"
  target:
    entity:
      domain: vacuum
      integration: switchbot_vacuum
  fields:
    rooms:
      name: "Rooms"
      description: "List of room IDs (e.g. ROOM_001) or room names"
      required: true
      example: '["ROOM_013", "ROOM_008"]'
      selector:
        object:
    mode:
      name: "Clean Mode"
      description: "Cleaning mode"
      default: "sweep_mop"
      selector:
        select:
          options:
            - "sweep"
            - "mop"
            - "sweep_mop"
    fan_level:
      name: "Fan Level"
      description: "Suction power (1=quiet, 2=standard, 3=strong, 4=max)"
      default: 1
      selector:
        number:
          min: 1
          max: 4
          step: 1
    water_level:
      name: "Water Level"
      description: "Water output (1=low, 2=medium, 3=high)"
      default: 1
      selector:
        number:
          min: 1
          max: 3
          step: 1
    times:
      name: "Passes"
      description: "Number of cleaning passes"
      default: 1
      selector:
        number:
          min: 1
          max: 2
          step: 1
    force_order:
      name: "Force Order"
      description: "Clean rooms in the specified order"
      default: true
      selector:
        boolean:

force_refresh:
  name: "Force Refresh"
  description: "Force refresh device status and room data from S3"
  target:
    entity:
      domain: vacuum
      integration: switchbot_vacuum
